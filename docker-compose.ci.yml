version: '3.8'
services:
  mwv-headless:
    build:
      context: .
      dockerfile: Dockerfile.headless
    volumes:
      - ./tests/fixtures:/fixtures:ro
    environment:
      - ENABLE_INTEGRATION=1
      - MODE=cli
    entrypoint: ["python", "-m", "cli"]
    command: ["parse", "/fixtures/sample.mp3", "--output", "/fixtures/out.json"]
