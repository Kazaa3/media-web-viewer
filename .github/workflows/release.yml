name: Build and Release

on:
  push:
    tags:
      - "v*" # Triggers on version tags like v1.33
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo xvfb firefox-geckodriver
      - name: Install dependencies (selenium)
        run: |
          pip install --upgrade pip
          pip install -r infra/requirements-core.txt
          pip install -r infra/requirements-test.txt
          pip install -r infra/requirements-selenium.txt
      - name: Run Tech & Basic Tests
        run: |
          PYTHONPATH=. pytest tests/integration/category/tech/ tests/integration/category/basic/ -v
      - name: Run UI Tests (Headless)
        run: |
          PYTHONPATH=. xvfb-run -a pytest tests/e2e/selenium/ -v

  build-linux:
    needs: validation
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo
          pip install -r infra/requirements-build.txt

      - name: Build and Package (Linux)
        run: |
          python infra/build_system.py --build all --monitor --skip-build-gate

      - name: Upload Linux Executable
        uses: actions/upload-artifact@v4
        with:
          name: MediaWebViewer-Linux
          path: |
            dist/MediaWebViewer
            dist/MediaWebViewer-*-Linux

      - name: Upload DEB Package
        uses: actions/upload-artifact@v4
        with:
          name: MediaWebViewer-DEB
          path: build/media-web-viewer_*_amd64.deb
          if-no-files-found: error

      - name: Upload Management Reports
        uses: actions/upload-artifact@v4
        with:
          name: Management-Reports-Release
          path: build/management_reports/
          if-no-files-found: warn

  build-windows:
    needs: validation
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          pip install -r infra/requirements-build.txt

      - name: Build Windows Executable
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          python -m PyInstaller \
            --onefile \
            --noconsole \
            --name "MediaWebViewer-${VERSION}-Windows" \
            --add-data "web;web" \
            --hidden-import bottle_websocket \
            --hidden-import gevent \
            --hidden-import gevent.monkey \
            main.py

      - name: Verify Windows build output
        shell: bash
        run: |
          ls -lh dist/

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: MediaWebViewer-Windows
          path: dist/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-linux, build-windows]
    if: ${{ always() && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="v${VERSION}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.TAG_NAME }}
          name: Media Web Viewer v${{ steps.meta.outputs.VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            ## 🚀 Media Web Viewer v${{ steps.meta.outputs.VERSION }}

            ### Changes in this release
            - FFmpeg parser: Fixed 24-bit PCM detection
            - Tests: Updated to use real media files
            - Tests: Skip logic now fails instead of passing

            ### Downloads
            - **Linux**: `MediaWebViewer-Linux` (executable)
            - **Linux**: `MediaWebViewer-DEB` (.deb package)
            - **Windows**: `MediaWebViewer-Windows.exe`

            ### Installation
            #### Linux (DEB)
            ```bash
            sudo dpkg -i media-web-viewer_${{ steps.meta.outputs.VERSION }}_amd64.deb
            ```

            #### Linux (Executable)
            ```bash
            chmod +x MediaWebViewer-*
            ./MediaWebViewer-*
            ```

            #### Windows
            Simply run the `.exe` file (no installation required).

            ### Requirements
            - FFmpeg (for media processing)
            - MediaInfo (for metadata extraction)
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          overwrite_files: true
          files: |
            artifacts/MediaWebViewer-Linux/*
            artifacts/MediaWebViewer-Windows/*
            artifacts/MediaWebViewer-DEB/*
