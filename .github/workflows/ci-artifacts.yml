name: CI Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build and Package (Linux)
        run: |
          ./.venv_build/bin/python infra/build_system.py --build all --monitor --skip-build-gate

      - name: Upload Linux executable
        uses: actions/upload-artifact@v4
        with:
          name: MediaWebViewer-Linux-main
          path: dist/MediaWebViewer
          if-no-files-found: error

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: MediaWebViewer-DEB-main
          path: build/media-web-viewer_*_amd64.deb
          if-no-files-found: error
