name: CI Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Install Geckodriver (Fallback)
        run: |
          if ! command -v geckodriver; then
            echo "Geckodriver not found, downloading from Mozilla..."
            GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep tag_name | cut -d '"' -f4)
            wget -O geckodriver.tar.gz "https://github.com/mozilla/geckodriver/releases/download/${GECKO_VERSION}/geckodriver-${GECKO_VERSION}-linux64.tar.gz"
            tar -xzf geckodriver.tar.gz
            chmod +x geckodriver
            sudo mv geckodriver /usr/local/bin/
            rm geckodriver.tar.gz
          fi
          geckodriver --version || (echo "Geckodriver installation failed" && exit 1)

      - name: Build and Package (Linux)
        run: |
          ./.venv_build/bin/python infra/build_system.py --build all --monitor --skip-build-gate

      - name: Upload Linux executable
        uses: actions/upload-artifact@v4
        with:
          name: MediaWebViewer-Linux-main
          path: dist/MediaWebViewer
          if-no-files-found: error

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: MediaWebViewer-DEB-main
          path: build/media-web-viewer_*_amd64.deb
          if-no-files-found: error
