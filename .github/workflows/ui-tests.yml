name: UI Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo xvfb firefox-geckodriver

      - name: Install dependencies (selenium)
        run: |
          pip install --upgrade pip
          pip install -r infra/requirements-selenium.txt

      - name: Run Selenium Tests (Headless)
        run: |
          export PYTHONPATH=.
          xvfb-run -a pytest tests/selenium/pages/ -v
