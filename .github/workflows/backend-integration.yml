name: Backend Integration
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo

      - name: Install dependencies (testbed)
        run: |
          pip install --upgrade pip
          pip install -r infra/requirements-test.txt

      - name: Run Tech Tests
        run: |
          PYTHONPATH=. pytest tests/tech/ -v

      - name: Run Basic Tests
        run: |
          PYTHONPATH=. pytest tests/basic/ -v

  backend-docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build headless image
        run: docker build -t mwv-headless -f Dockerfile.headless .

      - name: Run parser smoke in container
        run: |
          mkdir -p artifacts
          docker run --rm \
            -v ${{ github.workspace }}/tests/fixtures:/fixtures:ro \
            -v ${{ github.workspace }}/artifacts:/artifacts \
            -e ENABLE_INTEGRATION=1 \
            mwv-headless parse /fixtures/sample.mp3 --output /artifacts/out.json || true
