<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer v1.46.00 - MASTER</title>
    
    <!-- Design System -->
    <link rel="stylesheet" href="css/shell_master.css?v=1.45.100">
    
    <!-- Legacy Styles (selective import for fragments) -->
    <link rel="stylesheet" href="css/main.css?v=1.45.100">
</head>
<body>

    <!-- [HEAD] TOP NAVIGATION BAR -->
    <header id="master-header-container" class="master-header elite-inversion">
        <!-- Slot 1: Navigation -->
        <div class="nav-cluster primary-cluster">
            <!-- Dynamically Hydrated (v1.43) -->
        </div>

        <!-- Slot 2: Brand / Title -->
        <div class="header-center-title">
            <span class="logo-text">FORENSIC MEDIA WORKSTATION</span>
        </div>

            <!-- Slot 3: HUD & Controls -->
        <div class="nav-cluster secondary-cluster">
            <!-- [HUD] ELITE MONITORING LAYER -->
            <div class="elite-hud">
                <div class="hud-pill" title="Backend Process ID">BE: <span id="diag-pid" class="hud-val blue">--</span></div>
                <div class="hud-pill" title="Frontend (Browser) Process ID">FE: <span id="diag-pid-fe" class="hud-val orange">--</span></div>
                <div class="hud-pill">BOOT: <span id="diag-boot" class="hud-val green">--s</span></div>
            </div>

            <!-- [SYS] WORKSTATION CONTROLS (Top Right Alignment) -->
            <div class="header-sys-cluster" style="display: flex; gap: 4px; margin-left: 15px; border-left: 1px solid var(--border-header-elite); padding-left: 12px;">
                <button class="tool-icon-btn" onclick="if(typeof toggleTheme === 'function') toggleTheme()" title="Toggle Theme">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <button class="tool-icon-btn" onclick="if(typeof toggleSidebar === 'function') toggleSidebar()" title="Toggle Sidebar">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </button>
                <button class="tool-icon-btn" onclick="if(typeof toggleDiagnosticsSidebar === 'function') toggleDiagnosticsSidebar()" title="Toggle HUD Overlay" style="color: #ff3366;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- [NECK] SUB-NAVIGATION BAR (DYNAMIC) -->
    <nav id="sub-nav-container" class="sub-nav-neck">
        <!-- Content injected via Python SSOT or Rebuild Fragment (v1.42) -->
    </nav>

    <div id="rebuild-pill-container" class="sub-nav-bar" style="display: none;">
        <!-- Level 2 Pills (Queue, Playlist, etc.) for rebuild mode -->
    </div>

    <!-- [BODY] MAIN VIEWPORT DECK -->
    <main id="main-viewport-container" class="main-viewport">
        <!-- [v1.44] REBUILD MODE: UNIFIED FORENSIC STAGE -->
        <div id="rebuild-stage" class="deck-view rebuild-stage-active" data-tab-domain="rebuild" 
             style="display:none; position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5000; background: var(--bg-master); flex-direction: column;">
            <div class="stage-sentinel-loader loading-fragment">INITIALIZING STAGE...</div>
        </div>
        
        <!-- Category Fragments -->
        <div id="player-panel-container" class="deck-view active">
            <div id="player-main-viewport" style="width: 100%; height: 100%;">
                <div class="loading-fragment">Initializing Forensic Player...</div>
            </div>
        </div>

        <div id="library-panel-container" class="deck-view">
            <div id="library-main-viewport" style="width: 100%; height: 100%;">
                <div class="loading-fragment">Hydrating Library...</div>
            </div>
        </div>

        <div id="status-panel-container" class="deck-view">
            <div id="status-main-viewport" style="width: 100%; height: 100%;">
                <div class="loading-fragment">Opening Diagnostics...</div>
            </div>
        </div>
    </main>

    <!-- [FOOTER] HIGH-DENSITY FORENSIC CONTROL BAR -->
    <footer class="master-footer">
        <!-- Cluster 1: DB Count -->
        <div class="footer-db-status">
            ITEMS: <span id="footer-db-count" class="hud-val green">--</span>
        </div>

        <!-- Cluster 2: Swiss Army Tools (Centrally Grouped) -->
        <div class="swiss-hud-row">
            <!-- Frontend (FE) -->
            <div id="hud-fe" class="hud-group" title="Frontend: DOM-Sync & Registry">
                <span class="hud-label">FE</span>
                <div class="hud-led"></div>
                <button class="hud-btn-tiny" onclick="if(typeof syncLibrary === 'function') syncLibrary();">SYNC</button>
            </div>
            <!-- Backend (BE) -->
            <div id="hud-be" class="hud-group" title="Backend: Eel & Process">
                <span class="hud-label">BE</span>
                <div class="hud-led"></div>
                <button class="hud-btn-tiny" onclick="if(typeof eel !== 'undefined' && typeof eel.kill_stale_and_restart === 'function') eel.kill_stale_and_restart();">KILL</button>
            </div>
            <!-- Database (DB) -->
            <div id="hud-db" class="hud-group" title="Database: SQLite & Con">
                <span class="hud-label">DB</span>
                <div class="hud-led"></div>
                <button class="hud-btn-tiny" onclick="if(typeof eel !== 'undefined' && typeof eel.trigger_db_reconnect === 'function') eel.trigger_db_reconnect()(() => syncLibrary());">RECON</button>
            </div>
            <!-- Hydration (HYDR) -->
            <div id="hud-hydr" class="hud-group" title="Hydration: M(ock) R(eal) B(oth)">
                <span class="hud-label">HYDR</span>
                <div class="hud-led"></div>
                <button id="hydr-btn-M" class="hud-btn-tiny" onclick="setHydrationMode('mock')">M</button>
                <button id="hydr-btn-R" class="hud-btn-tiny" onclick="setHydrationMode('real')">R<span id="hydr-stage-indicator" style="margin-left: 2px; opacity: 0.7; font-size: 7px;">0</span></button>
                <button id="hydr-btn-B" class="hud-btn-tiny" onclick="setHydrationMode('both')">B</button>
            </div>
            <!-- Diagnostics (RX) -->
            <div id="hud-diag" class="hud-group" title="Toggles: RAW(Data) BYPS(Checks)">
                <span class="hud-label">RX</span>
                <div class="hud-led"></div>
                <button id="footer-btn-RAW" class="hud-btn-tiny" onclick="toggleDiagnosticsFlag('RAW')">RAW</button>
                <button id="footer-btn-BYPS" class="hud-btn-tiny" onclick="toggleDiagnosticsFlag('BYPS')">BYPS</button>
            </div>
            
            <button class="hud-btn-prime" onclick="if(window.MWV_Diagnostics) window.MWV_Diagnostics.toggle();">LOGS</button>
        </div>

        </div>

        <!-- Cluster 3: System Status (v1.54.002 High-Density) -->
        <div class="footer-db-status" style="margin-left: auto; opacity: 0.5; font-size: 9px; display: flex; align-items: center; gap: 8px;">
            <button id="footer-btn-UPDT" class="hud-btn-tiny" style="color: #00ff00; border-color: rgba(0,255,0,0.2);" onclick="window.triggerWorkstationUpdate()">UPDT</button>
            VER: <span class="hud-val orange">v1.54.002</span>
        </div>
    </footer>

    <!-- [BRIDGE] MODAL & OVERLAY PLACEHOLDERS -->
    <div id="modals-placeholder"></div>
    <div id="context-menu-placeholder"></div>
    <div id="svg-icons-placeholder" style="display: none;"></div>
    <div id="diagnostics-overlay-container"></div>
    <div id="global-diagnostics-sidebar" class="diagnostics-sidebar"></div>

    <!-- [FORENSIC] AUDIO PIPELINE (v1.46.019) -->
    <audio id="native-html5-audio-pipeline-element" style="display:none;"></audio>

    <!-- [BRIDGE] LEGACY COMPATIBILITY ANCHORS (v1.46.019) -->
    <div id="main-sidebar" style="display:none;"></div>
    <div id="main-content-area" style="display:none;"></div>

    <!-- [v1.46.019] EMERGENCY ERROR BRIDGE -->
    <script>
        // [v1.46.019] Safe Tracing Stub (Prevents ReferenceError before modules load)
        window.mwv_trace = window.mwv_trace || function() {};
        window.mwv_trace_render = window.mwv_trace_render || function() {};
        window.traceUiNav = window.traceUiNav || function() {};

        window.onerror = function(message, source, lineno, colno, error) {
            console.error("[JS-CRASH]", message, "at", source, ":", lineno);
            if (typeof eel !== 'undefined' && typeof eel.log_js_error === 'function') {
                eel.log_js_error({
                    type: 'ERROR',
                    message: message,
                    source: source,
                    lineno: lineno,
                    colno: colno,
                    stack: error ? error.stack : 'N/A'
                });
            }
        };
    </script>

    <!-- Critical Core Scripts -->
    <script type="text/javascript" src="/eel.js?v=1.45.100"></script>
    <script src="js/trace_helpers.js?v=1.45.100"></script>
    <script src="js/common_helpers.js?v=1.46.039"></script>
    <script src="js/db.js?v=1.45.100"></script>
    <script src="js/bibliothek.js?v=1.45.100"></script>
    <script src="js/translations.js?v=1.45.100"></script>
    <script src="js/item.js?v=1.45.100"></script>
    <script src="js/collections.js?v=1.45.130"></script>
    <script src="js/ui_nav_helpers.js?v=1.45.100"></script>
    <script src="js/fragment_loader.js?v=1.45.100"></script>
    <script src="js/visibility_sentinel.js?v=1.45.100"></script>
    <script src="js/window_manager.js?v=1.45.100"></script>
    <script src="js/playlists.js?v=1.45.100"></script>
    <script src="js/app_core.js?v=1.45.100"></script>
    <script src="js/workstation_bridge.js?v=1.45.100"></script>
    <script src="js/audioplayer.js?v=1.45.100"></script>
    <script src="js/mwv_hotkeys.js?v=1.45.100"></script>
    <script src="js/debug_helpers.js?v=1.45.100"></script>
    
    <!-- [v1.46.041] Modular Forensic & Diagnostic Suite Loader -->
    <script>
        (function() {
            const v = "1.46.041";
            const config = window.CONFIG || window.GLOBAL_CONFIG || {};
            const forensic = config.forensic_feature_registry || {
                enable_hydration_bridge: true,
                enable_recovery_engine: true,
                enable_nuclear_pulse: true,
                enable_diagnostics_helpers: true
            };

            const scripts = [];
            if (forensic.enable_diagnostics_helpers) scripts.push(`js/diagnostics_helpers.js?v=${v}`);
            if (forensic.enable_hydration_bridge)    scripts.push(`js/forensic_hydration_bridge.js?v=${v}`);
            if (forensic.enable_recovery_engine)    scripts.push(`js/forensic_recovery_engine.js?v=${v}`);
            if (forensic.enable_nuclear_pulse)      scripts.push(`js/nuclear_recovery_pulse.js?v=${v}`);
            
            // Core Diagnostics (Always Loaded unless specifically overridden)
            scripts.push(`js/gui_diagnostics.js?v=${v}`);
            scripts.push(`js/version.js?v=${v}`);

            scripts.forEach(src => {
                const s = document.createElement('script');
                s.src = src;
                s.async = false; // Maintain execution order
                document.head.appendChild(s);
            });
            console.log(`[BOOT] Forensic Suite Loader: ${scripts.length} modules queued.`);
        })();
    </script>

    <!-- [BOOTSTRAP] ATOMIC BRIDGE TRIGGER (v1.45.200 Robust) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("[ATOMIC-BOOT] Initializing Forensic Bridge...");
            
            const waitForConfig = setInterval(async () => {
                const configLoaded = window.CONFIG || window.GLOBAL_CONFIG;
                if (configLoaded && window.WM) {
                    clearInterval(waitForConfig);
                    console.info("[ATOMIC-BOOT] Configuration verified. Triggering Activation...");
                    
                    try {
                        // 1. Determine Initial Target
                        const activeCat = localStorage.getItem('mwv_active_category') || 'media';
                        const targetWindow = activeCat === 'media' ? 'player' : activeCat;

                        // 2. Perform Atomic Activation (Fragment Load -> Hydration Hashshake)
                        console.log(`[ATOMIC-BOOT] Activating initial window: ${targetWindow}`);
                        await window.WM.activate(targetWindow, true);
                        
                        // 3. Finalize Sidebar & Theme State
                        if (typeof restoreSidebarState === 'function') restoreSidebarState();
                        if (typeof updateGlobalSubNav === 'function') updateGlobalSubNav(activeCat);
                        
                    } catch (e) {
                        console.error("[ATOMIC-BOOT] Bootstrap Activation Failed:", e);
                    }
                }
            }, 100);
        });
    </script>
</body>
</html>
