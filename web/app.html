<!DOCTYPE html>
<html>

<head>
    <script type="text/javascript" src="/eel.js"></script>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        #player {
            width: 100%;
            height: 60px;
            margin: 20px 0;
        }

        .media-item {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .media-cover {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            margin-right: 15px;
            background-color: #ddd;
            /* fallback if no cover */
        }

        .media-info {
            display: flex;
            flex-direction: column;
        }

        .media-item:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <h1>Media Library</h1>
    <button onclick="scan()">Scan Media</button>
    <div id="media-list"></div>
    <audio id="player" controls></audio>
    <div id="status"></div>

    <script>
        let currentPlayer = document.getElementById('player');

        async function scan() {
            let result = await eel.scan_media()();
            let list = document.getElementById('media-list');
            list.innerHTML = '';
            result.media.forEach(item => {
                let div = document.createElement('div');
                div.className = 'media-item';
                let tags = item.tags;
                let extraInfo = [tags.year, tags.genre, tags.track ? 'Track ' + tags.track : ''].filter(Boolean).join(' • ');

                div.innerHTML = `
                    <img class="media-cover" src="/cover/${encodeURIComponent(item.name)}" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='; this.style.backgroundColor='#ddd';" alt="Cover Art">
                    <div class="media-info">
                        <strong>${item.name}</strong> 
                        <span>${tags.artist} - ${tags.title} (${item.duration}, ${item.type})</span>
                        <span style="font-size: 0.85em; color: #666; margin-top: 2px;">${extraInfo}</span>
                    </div>
                `;
                let mediaUrl = '/media/' + encodeURIComponent(item.name);
                if (item.type === 'm4a' || item.type === 'alac') {
                    // Trick the browser: Chromium aborts requests for .m4a instantly.
                    // By appending .flac, it sends the HTTP request, hitting our backend transcode.
                    mediaUrl += '.flac_transcoded';
                }
                div.onclick = () => play(item.name, mediaUrl);
                list.appendChild(div);
            });
        }

        function play(name, path) {
            currentPlayer.src = path;  // HTML5 Audio/Video
            currentPlayer.play();
            document.getElementById('status').innerHTML = `Spielt: ${name}`;
            eel.play_media(path)();  // Python-Benachrichtigung
        }

        scan();  // Auto-Scan
    </script>
</body>

</html>
