<!-- ===================== FILESYSTEM BROWSER (v1.34) ===================== -->
<div id="browser-split-container" style="display: flex; width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary);">
    
    <!-- LEFT SIDEBAR: Library Folders -->
    <div id="browser-left-sidebar" class="sidebar" style="width: 280px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; padding: 24px;">
        <div style="margin-bottom: 20px;">
            <h4 style="margin: 0; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 700;" data-i18n="browser_folders_title">Library Folders</h4>
        </div>
        <div id="browser-folder-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;">
            <!-- Folders rendered dynamically via browse.js -->
        </div>
    </div>

    <!-- Splitter -->
    <div id="browser-tab-splitter" class="splitter-v"></div>

    <!-- RIGHT CONTENT: Directory Browser -->
    <div id="browser-main-content" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); padding: 30px;">
        
        <div id="browser-top-pane" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column;">
            
            <!-- Sleek Path & Action Bar -->
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
                <button id="fb-back" onclick="fbBack()" class="tab-btn active" style="min-width: 44px; justify-content: center;" data-i18n="btn_back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>

                <div id="path-display-wrapper" class="glass-card" style="flex: 1; padding: 6px 18px; border-radius: var(--radius-pill); display: flex; align-items: center; overflow: hidden; gap: 10px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--accent-color);"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <div id="path-display" style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-primary); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; font-weight: 600;">/</div>
                </div>

                <div style="display: flex; gap: 8px;">
                    <button onclick="fbNavigate(fbCurrentPath)" id="fb-refresh-btn" class="tab-btn" data-i18n="btn_refresh">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                    <button onclick="fbPickFolder()" id="fb-pick-folder-btn" class="tab-btn" data-i18n="btn_folder">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Manuell Navigation & Scan Strip -->
            <div class="glass-card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px; padding: 12px 20px; border-radius: var(--radius-card);">
                <input id="fb-path-input" type="text" placeholder="Manueller Pfad..." 
                    onkeypress="if(event.key === 'Enter') fbNavigate(this.value)"
                    style="flex: 1; padding: 10px 16px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-pill); font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-primary); outline: none;" />

                <button onclick="scan(document.getElementById('fb-path-input').value, false)" class="tab-btn active" style="background: var(--accent-color); border: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
                    <span data-i18n="fb_add_path">Index hinzufügen</span>
                </button>
            </div>

            <!-- File List Container -->
            <div id="fb-list-wrapper" class="glass-card" style="padding: 0; overflow: hidden; border-radius: var(--radius-card); flex: 1;">
                <div id="fb-list" style="padding: 10px;">
                    <!-- Items rendered dynamically via browse.js -->
                </div>
            </div>
        </div>
    </div>
</div>
