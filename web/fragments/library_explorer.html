<div id="lib-split-container"
    style="display: flex; width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary);">
    <!-- LEFT SIDEBAR: Filters & Categories -->
    <div id="lib-sidebar-left" class="sidebar" style="width: 280px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding: 24px; display: flex; flex-direction: column; overflow-y: auto;">

        <!-- Section 1: Übersicht (Navigation Overview) -->
        <div id="lib-nav-overview-container" style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px;">
            <h4 style="margin: 0 0 12px 10px; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1.5px; font-weight: 800;"
                data-i18n="sb_overview">Übersicht</h4>
            <button id="lib-tab-btn-overview" class="sub-tab-btn active" onclick="switchLibrarySubTab('coverflow')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg> Alle Medien</button>
            <button id="lib-tab-btn-cinema" class="sub-tab-btn" onclick="switchLibrarySubTab('cinema')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg> Cinema</button>
            <button id="lib-tab-btn-films" class="sub-tab-btn" onclick="switchLibrarySubTab('films')">
            <button id="lib-tab-btn-series" class="sub-tab-btn" onclick="switchLibrarySubTab('series')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="15" rx="2" /><path d="M17 2l2 5" /><path d="M7 2l-2 5" /></svg> Serien</button>
            <button id="lib-tab-btn-albums" class="sub-tab-btn" onclick="switchLibrarySubTab('albums')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="3" /></svg> Alben</button>
            <button id="lib-tab-btn-audiobooks" class="sub-tab-btn" onclick="switchLibrarySubTab('audiobooks')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg> Hörbuch</button>
            <button id="lib-tab-btn-pictures" class="sub-tab-btn" onclick="switchLibrarySubTab('pictures')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Bilder</button>
            <button id="lib-tab-btn-documents" class="sub-tab-btn" onclick="switchLibrarySubTab('documents')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Dokumente</button>
        </div>

        <div style="height: 1px; background: var(--border-color); margin: 5px 10px 20px 10px; opacity: 0.5;"></div>

        <!-- Section 2: Ansichten (Presentation Modes) -->
        <div id="lib-nav-views-container" style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px;">
            <h4 style="margin: 0 0 12px 10px; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1.5px; font-weight: 800;"
                data-i18n="sb_views">Ansichten</h4>
            <button id="lib-tab-btn-coverflow" class="sub-tab-btn active" onclick="switchLibrarySubTab('coverflow')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" /><path d="M7 3v18M17 3v18M3 12h18" /></svg> Coverflow</button>
            <button id="lib-tab-btn-grid" class="sub-tab-btn" onclick="switchLibrarySubTab('grid')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg> Grid</button>
            <button id="lib-tab-btn-details" class="sub-tab-btn" onclick="switchLibrarySubTab('details')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></svg> Details</button>
            <button id="lib-tab-btn-streaming" class="sub-tab-btn" onclick="switchLibrarySubTab('streaming')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3" /></svg> Streaming</button>
        </div>

        <div style="height: 1px; background: var(--border-color); margin: 5px 10px 20px 10px; opacity: 0.5;"></div>

        <!-- Section 3: Filtern & Suche (Specific Filters) -->
        <div id="lib-nav-filters-container" style="display: flex; flex-direction: column; gap: 8px;">
            <h4 style="margin: 0 0 12px 10px; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1.5px; font-weight: 800;"
                data-i18n="filter_title">Filtern &amp; Suche</h4>

            <div style="padding: 0 10px 12px 10px;">
                <input type="text" id="library-search-input" placeholder="Suchen..."
                    oninput="handleLibrarySearch(this.value)"
                    style="width: 100%; padding: 10px 14px; border-radius: var(--radius-pill); border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px; padding: 0 10px;">
                <select id="library-genre-filter" class="tab-btn" onchange="setLibraryGenreFilter(this.value)"
                    style="width: 100%; padding: 8px 12px; font-size: 12px; border-color: var(--border-color);">
                    <option value="all">Alle Genres</option>
                </select>
                <select id="library-year-filter" class="tab-btn" onchange="setLibraryYearFilter(this.value)"
                    style="width: 100%; padding: 8px 12px; font-size: 12px; border-color: var(--border-color);">
                    <option value="all">Alle Jahre</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Splitter -->
    <div id="lib-splitter" class="splitter-v"></div>

    <!-- MAIN CONTENT: Results -->
    <div id="lib-main-content-pane"
        style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); position: relative;">

        <div id="lib-domain-visual" class="lib-domain-content active"
            style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <!-- Result Content Wrapper (Mediathek) -->
            <div id="lib-results-container" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">

                <!-- Video Streaming View -->
                <div id="lib-view-streaming" class="library-sub-content" style="padding: 24px; overflow-y: auto;">
                    <div id="streaming-grid-container" class="streaming-grid"></div>
                </div>

                <!-- Coverflow View -->
                <div id="lib-view-coverflow" class="library-sub-content active"
                    style="flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg-primary) 100%);">
                    <div id="coverflow-container" class="coverflow-wrap">
                        <div id="coverflow-track" class="coverflow-track"></div>
                    </div>
                </div>

                <!-- Grid View -->
                <div id="lib-view-grid" class="library-sub-content"
                    style="; padding: 30px; overflow-y: auto;">
                    <div id="grid-container" class="media-grid"></div>
                </div>

                <!-- Details Table View -->
                <div id="lib-view-details" class="library-sub-content"
                    style="; padding: 24px; overflow-y: auto;">
                    <div class="glass-card" style="padding: 0; overflow: hidden;">
                        <table id="details-table" class="details-table" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr id="details-table-header"
                                    style="background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
                                </tr>
                            </thead>
                            <tbody id="details-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Album View -->
                <div id="lib-view-album" class="library-sub-content"
                    style="; padding: 30px; overflow-y: auto;">
                    <div id="album-grid-container" class="media-grid"></div>
                </div>

                <!-- Following View -->
                <div id="lib-view-following" class="library-sub-content"
                    style="; padding: 30px; overflow-y: auto;">
                    <div id="following-grid-container" class="media-grid"></div>
                </div>
            </div>

            <!-- Domain: Browse (File) -->
            <div id="lib-domain-browse" class="lib-domain-content" style="; flex: 1; overflow: hidden;">
                <div id="lib-browse-mount-point" style="height: 100%; width: 100%;">
                    <div class="loading-fragment">Lade Dateibrowser...</div>
                </div>
            </div>

            <!-- Domain: Inventory (Item) -->
            <div id="lib-domain-inventory" class="lib-domain-content" style="; flex: 1; overflow: hidden;">
                <div id="lib-inventory-mount-point" style="height: 100%; width: 100%;">
                    <div class="loading-fragment">Lade Inventory...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * Switch Library Domains (Visual, Browse, Inventory)
     */
    function switchLibraryDomain(domainId) {
        if (typeof mwv_trace === 'function') mwv_trace('SUBTAB-LIB-DOMAIN', domainId);

        document.querySelectorAll('.lib-domain-content').forEach(el => el.style.display = 'none');
        const target = document.getElementById('lib-domain-' + domainId);
        if (target) {
            target.style.display = 'flex';
            // Trigger domain-specific refresh
            if (domainId === 'visual') {
                if (typeof renderLibrary === 'function') renderLibrary();
            } else if (domainId === 'browse' && typeof fbNavigate === 'function') {
                fbNavigate(typeof fbCurrentPath !== 'undefined' ? fbCurrentPath : '/');
            } else if (domainId === 'inventory' && typeof refreshLibrary === 'function') {
                refreshLibrary();
            }
        }
    }

    /**
     * Switch Library Sub-Tabs (Coverflow, Grid, Details, etc.)
     */
    function switchLibrarySubTab(viewId) {
        if (typeof mwv_trace === 'function') mwv_trace('SUBTAB-LIB-VIEW', viewId);

        document.querySelectorAll('.library-sub-content').forEach(el => {
            el.style.display = 'none';
            el.classList.remove('active');
        });
        document.querySelectorAll('.sub-tab-btn').forEach(el => el.classList.remove('active'));

        const target = document.getElementById('lib-view-' + viewId);
        if (target) {
            target.style.display = (viewId === 'coverflow') ? 'flex' : 'block';
            target.classList.add('active');

            const btn = document.getElementById('lib-tab-btn-' + viewId);
            document.getElementById('lib-results-container').style.display = 'block';

            const fragmentViewId = viewId === 'films' ? 'film_view.html' :
                viewId === 'series' ? 'serie_view.html' :
                    viewId === 'albums' ? 'album_view.html' :
                        viewId === 'audiobooks' ? 'audiobook_view.html' : 
                            viewId === 'cinema' ? 'video_view.html' : null;

            if (fragmentViewId && typeof FragmentLoader !== 'undefined') {
                // Inject specialized high-fidelity view into results pane
                FragmentLoader.load('lib-results-container', 'fragments/' + fragmentViewId, () => {
                    console.log(`[Library] Loaded specialized fragment: ${fragmentViewId}`);
                    // Hydrate specialized view
                    if (viewId === 'films' && typeof initFilmsView === 'function') initFilmsView();
                    else if (viewId === 'series' && typeof initSeriesView === 'function') initSeriesView();
                    else if (viewId === 'albums' && typeof initAlbumsView === 'function') initAlbumsView();
                    else if (viewId === 'audiobooks' && typeof initAudiobooksView === 'function') initAudiobooksView();
                    else if (viewId === 'cinema' && typeof initCinemaView === 'function') initCinemaView();
                });
            } else {
                // Standard categories (v1.41.00)
                if (viewId === 'pictures' && typeof initPicturesView === 'function') initPicturesView();
                else if (viewId === 'documents' && typeof initDocumentsView === 'function') initDocumentsView();
                else if (typeof renderLibrary === 'function') {
                    // Reset category filter if clicking 'Alle Medien' (overview) or a generic view
                    if (viewId === 'overview' || viewId === 'coverflow' || viewId === 'grid' || viewId === 'details') {
                        if (typeof setLibraryFilter === 'function') setLibraryFilter('all');
                    }
                    renderLibrary();
                }
            }

            if (btn) btn.classList.add('active');

            // Trigger view-specific render
            if (viewId === 'database' && typeof renderDatabaseView === 'function') renderDatabaseView();
        }
    }

    // Default to coverflow if nothing active
    setTimeout(() => {
        const active = document.querySelector('.library-sub-content.active');
        if (!active) switchLibrarySubTab('coverflow');
    }, 100);
</script>
