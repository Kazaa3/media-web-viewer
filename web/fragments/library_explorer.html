    <div id="lib-split-container" style="display: flex; width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary);">
        <!-- LEFT SIDEBAR: Filters & Categories -->
        <div id="lib-sidebar-left" class="sidebar">
            
            <!-- Top Sub-Tabs (Views) -->
            <div id="lib-nav-views-container" style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px;">
                <h4 style="margin: 0 0 10px 10px; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 700;" data-i18n="sb_views">Ansichten</h4>
                <button id="lib-tab-btn-coverflow" class="sub-tab-btn active" onclick="switchLibrarySubTab('coverflow')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 3v18M17 3v18M3 12h18"/></svg> Coverflow</button>
                <button id="lib-tab-btn-grid" class="sub-tab-btn" onclick="switchLibrarySubTab('grid')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Grid</button>
                <button id="lib-tab-btn-details" class="sub-tab-btn" onclick="switchLibrarySubTab('details')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> Details</button>
                <button id="lib-tab-btn-streaming" class="sub-tab-btn" onclick="switchLibrarySubTab('streaming')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Streaming</button>
                <button id="lib-tab-btn-album" class="sub-tab-btn" onclick="switchLibrarySubTab('album')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg> Alben</button>
                <button id="lib-tab-btn-database" class="sub-tab-btn" onclick="switchLibrarySubTab('database')" style="margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 12px; border-radius: 0;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg> Datenbank</button>
            </div>

            <!-- Category Filters -->
            <div id="lib-nav-container" style="display: flex; flex-direction: column; gap: 8px;">
                <h4 style="margin: 0 0 10px 10px; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 700;" data-i18n="filter_title">Kategorien</h4>
                
                <div style="padding: 0 10px 15px 10px;">
                    <input type="text" id="library-search-input" placeholder="Suchen..."
                        oninput="handleLibrarySearch(this.value)"
                        style="width: 100%; padding: 10px 14px; border-radius: var(--radius-pill); border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s;">
                </div>

                <div class="filter-group" style="display: flex; flex-direction: column; gap: 4px;">
                    <button class="options-subtab active" data-cat="all" onclick="setLibraryFilter('all')" data-i18n="filter_all">Alle</button>
                    <button class="options-subtab" data-cat="audio" onclick="setLibraryFilter('all')" data-i18n="filter_audio">Audio</button>
                    <button class="options-subtab" data-cat="video" onclick="setLibraryFilter('all')" data-i18n="filter_video">Video</button>
                    <button class="options-subtab" data-cat="film" onclick="setLibraryFilter('all')" data-i18n="cat_film">Film</button>
                    <button class="options-subtab" data-cat="serie" onclick="setLibraryFilter('all')" data-i18n="cat_serie">Serie</button>
                    <button class="options-subtab" data-cat="album" onclick="setLibraryFilter('all')" data-i18n="cat_album">Album</button>
                </div>
                
                <div style="height: 1px; background: var(--border-color); margin: 15px 10px;"></div>
                
                <div style="display: flex; flex-direction: column; gap: 8px; padding: 0 10px;">
                    <select id="library-genre-filter" class="tab-btn" onchange="setLibraryGenreFilter(this.value)" style="width: 100%; padding: 8px 12px; font-size: 12px;">
                        <option value="all">Alle Genres</option>
                    </select>
                    <select id="library-year-filter" class="tab-btn" onchange="setLibraryYearFilter(this.value)" style="width: 100%; padding: 8px 12px; font-size: 12px;">
                        <option value="all">Alle Jahre</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Splitter -->
        <div id="lib-splitter" class="splitter-v"></div>

        <!-- MAIN CONTENT: Results -->
        <div id="lib-main-content-pane" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); position: relative;">
            
            <!-- Result Content Wrapper -->
            <div id="lib-results-container" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
                
                <!-- Video Streaming View -->
                <div id="lib-view-streaming" class="library-sub-content" style="padding: 24px; overflow-y: auto;">
                    <div id="streaming-grid-container" class="streaming-grid"></div>
                </div>

                <!-- Database Master View -->
                <div id="lib-view-database" class="library-sub-content" style="display: none; padding: 24px; overflow-y: auto;">
                    <div class="glass-card" style="margin-bottom: 24px; display: flex; gap: 15px; align-items: center;">
                        <input type="text" id="lib-db-search" placeholder="Datenbank durchsuchen..."
                            oninput="renderDatabaseView()"
                            style="padding: 10px 18px; border: 1px solid var(--border-color); border-radius: var(--radius-pill); background: var(--bg-primary); color: var(--text-primary); outline: none; width: 300px;">

                        <div style="flex: 1;"></div>
                        
                        <div class="import-group" style="display: flex; gap: 8px;">
                            <button onclick="triggerTxtImport('Audio')" class="tab-btn sm"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14.89V20a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5.11"/><polyline points="17 9 12 14 7 9"/><line x1="12" y1="1" x2="12" y2="14"/></svg> Audio TXT</button>
                            <button onclick="triggerTxtImport('Film')" class="tab-btn sm">Film TXT</button>
                            <button onclick="triggerTxtImport('Video')" class="tab-btn sm">Video TXT</button>
                        </div>
                    </div>
                    
                    <div id="lib-db-stats" style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 600;"></div>
                    
                    <div class="glass-card" style="padding: 0; overflow: hidden;">
                        <table class="details-table" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
                                    <th style="width: 40px; padding: 12px;">#</th>
                                    <th style="padding: 12px; text-align: left;">Name</th>
                                    <th style="padding: 12px; text-align: left;">Typ</th>
                                    <th style="padding: 12px; text-align: left;">Artist / Album</th>
                                    <th style="padding: 12px; text-align: right;">Aktionen</th>
                                </tr>
                            </thead>
                            <tbody id="lib-db-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Coverflow View -->
                <div id="lib-view-coverflow" class="library-sub-content active" style="flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg-primary) 100%);">
                    <div id="coverflow-container" class="coverflow-wrap">
                        <div id="coverflow-track" class="coverflow-track"></div>
                    </div>
                </div>

                <!-- Grid View -->
                <div id="lib-view-grid" class="library-sub-content" style="display: none; padding: 30px; overflow-y: auto;">
                    <div id="grid-container" class="media-grid"></div>
                </div>

                <!-- Details Table View -->
                <div id="lib-view-details" class="library-sub-content" style="display: none; padding: 24px; overflow-y: auto;">
                    <div class="glass-card" style="padding: 0; overflow: hidden;">
                        <table id="details-table" class="details-table" style="width: 100%; border-collapse: collapse;">
                            <thead><tr id="details-table-header" style="background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);"></tr></thead>
                            <tbody id="details-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Album View -->
                <div id="lib-view-album" class="library-sub-content" style="display: none; padding: 30px; overflow-y: auto;">
                    <div id="album-grid-container" class="media-grid"></div>
                </div>

                <!-- Following View -->
                <div id="lib-view-following" class="library-sub-content" style="display: none; padding: 30px; overflow-y: auto;">
                    <div id="following-grid-container" class="media-grid"></div>
                </div>
            </div>
        </div>
    </div>
