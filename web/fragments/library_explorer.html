<div id="lib-split-container" data-liveness="pending"
    style="display: flex; width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary);">
    
    <!-- [v1.46.02] LEFT SIDEBAR: Relocated to Global Shell (app.html) -->

    <!-- MAIN CONTENT: Results -->
    <div id="lib-main-content-pane"
        style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); position: relative;">

        <div id="lib-domain-visual" class="lib-domain-content active"
            style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <!-- Result Content Wrapper (Mediathek) -->
            <div id="lib-results-container" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">

                <!-- Video Streaming View -->
                <div id="lib-view-streaming" class="library-sub-content" style="padding: 24px; overflow-y: auto;">
                    <div id="streaming-grid-container" class="streaming-grid"></div>
                </div>

                <!-- Coverflow View -->
                <div id="lib-view-coverflow" class="library-sub-content active"
                    style="flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg-primary) 100%);">
                    <div id="coverflow-container" class="coverflow-wrap">
                        <div id="coverflow-track" class="coverflow-track"></div>
                    </div>
                </div>

                <!-- Grid View -->
                <div id="lib-view-grid" class="library-sub-content"
                    style="; padding: 30px; overflow-y: auto;">
                    <div id="grid-container" class="media-grid"></div>
                </div>

                <!-- Details Table View -->
                <div id="lib-view-details" class="library-sub-content"
                    style="; padding: 24px; overflow-y: auto;">
                    <div class="glass-card" style="padding: 0; overflow: hidden;">
                        <table id="details-table" class="details-table" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr id="details-table-header"
                                    style="background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
                                </tr>
                            </thead>
                            <tbody id="details-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Album View -->
                <div id="lib-view-album" class="library-sub-content"
                    style="; padding: 30px; overflow-y: auto;">
                    <div id="album-grid-container" class="media-grid"></div>
                </div>

                <!-- Following View -->
                <div id="lib-view-following" class="library-sub-content"
                    style="; padding: 30px; overflow-y: auto;">
                    <div id="following-grid-container" class="media-grid"></div>
                </div>
            </div>

            <!-- Domain: Browse (File) -->
            <div id="lib-domain-browse" class="lib-domain-content" style="; flex: 1; overflow: hidden;">
                <div id="lib-browse-mount-point" style="height: 100%; width: 100%;">
                    <div class="loading-fragment">Lade Dateibrowser...</div>
                </div>
            </div>

            <!-- Domain: Inventory (Item) -->
            <div id="lib-domain-inventory" class="lib-domain-content" style="; flex: 1; overflow: hidden;">
                <div id="lib-inventory-mount-point" style="height: 100%; width: 100%;">
                    <div class="loading-fragment">Lade Inventory...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * Switch Library Domains (Visual, Browse, Inventory)
     */
    function switchLibraryDomain(domainId) {
        if (typeof mwv_trace === 'function') mwv_trace('SUBTAB-LIB-DOMAIN', domainId);

        document.querySelectorAll('.lib-domain-content').forEach(el => el.style.display = 'none');
        const target = document.getElementById('lib-domain-' + domainId);
        if (target) {
            target.style.display = 'flex';
            // Trigger domain-specific refresh
            if (domainId === 'visual') {
                if (typeof renderLibrary === 'function') renderLibrary();
            } else if (domainId === 'browse' && typeof fbNavigate === 'function') {
                fbNavigate(typeof fbCurrentPath !== 'undefined' ? fbCurrentPath : '/');
            } else if (domainId === 'inventory' && typeof refreshLibrary === 'function') {
                refreshLibrary();
            }
        }
    }

    /**
     * Switch Library Sub-Tabs (Coverflow, Grid, Details, etc.)
     */
    function switchLibrarySubTab(viewId) {
        if (typeof mwv_trace === 'function') mwv_trace('SUBTAB-LIB-VIEW', viewId);

        document.querySelectorAll('.library-sub-content').forEach(el => {
            el.style.display = 'none';
            el.classList.remove('active');
        });
        document.querySelectorAll('.sub-tab-btn').forEach(el => el.classList.remove('active'));

        const target = document.getElementById('lib-view-' + viewId);
        if (target) {
            target.style.display = (viewId === 'coverflow') ? 'flex' : 'block';
            target.classList.add('active');

            const btn = document.getElementById('lib-tab-btn-' + viewId);
            document.getElementById('lib-results-container').style.display = 'block';

            const fragmentViewId = viewId === 'films' ? 'film_view.html' :
                viewId === 'series' ? 'serie_view.html' :
                    viewId === 'albums' ? 'album_view.html' :
                        viewId === 'audiobooks' ? 'audiobook_view.html' : 
                            viewId === 'cinema' ? 'video_view.html' : null;

            if (fragmentViewId && typeof FragmentLoader !== 'undefined') {
                // Inject specialized high-fidelity view into results pane
                FragmentLoader.load('lib-results-container', 'fragments/' + fragmentViewId, () => {
                    console.log(`[Library] Loaded specialized fragment: ${fragmentViewId}`);
                    // Hydrate specialized view
                    if (viewId === 'films' && typeof initFilmsView === 'function') initFilmsView();
                    else if (viewId === 'series' && typeof initSeriesView === 'function') initSeriesView();
                    else if (viewId === 'albums' && typeof initAlbumsView === 'function') initAlbumsView();
                    else if (viewId === 'audiobooks' && typeof initAudiobooksView === 'function') initAudiobooksView();
                    else if (viewId === 'cinema' && typeof initCinemaView === 'function') initCinemaView();
                });
            } else {
                // Standard categories (v1.41.00)
                if (viewId === 'pictures' && typeof initPicturesView === 'function') initPicturesView();
                else if (viewId === 'documents' && typeof initDocumentsView === 'function') initDocumentsView();
                else if (typeof renderLibrary === 'function') {
                    // Reset category filter if clicking 'Alle Medien' (overview) or a generic view
                    if (viewId === 'overview' || viewId === 'coverflow' || viewId === 'grid' || viewId === 'details') {
                        if (typeof setLibraryFilter === 'function') setLibraryFilter('all');
                    }
                    renderLibrary();
                }
            }

            if (btn) btn.classList.add('active');

            // Trigger view-specific render
            if (viewId === 'database' && typeof renderDatabaseView === 'function') renderDatabaseView();
        }
    }

    // Default to coverflow if nothing active
    setTimeout(() => {
        // [v1.46.02] GLOBAL SIDEBAR SYNC
        // We now rely on the global renderLibrarySidebar() called by the shell or orchestration layer.
        if (typeof renderLibrarySidebar === 'function') renderLibrarySidebar();

        const active = document.querySelector('.library-sub-content.active');
        if (!active) switchLibrarySubTab('coverflow');

        // [v1.46.01] LIVENESS SIGNAL
        const shell = document.getElementById('lib-split-container');
        if (shell) shell.dataset.liveness = 'ready';
        console.info("[Library] Forensic Liveness: READY");
    }, 100);
</script>
