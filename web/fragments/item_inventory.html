<!-- ===================== ITEM INVENTORY (v1.34) ===================== -->
<div id="item-split-container" style="display: flex; flex: 1; height: 100%; overflow: hidden; background: var(--bg-primary);">
    
    <!-- Sidebar (Left) -->
    <div id="item-sidebar-left" class="sidebar" style="width: 320px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 24px;">
        <div style="margin-bottom: 24px;">
            <h3 style="margin: 0 0 12px 0; font-size: 1.25em; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px;" data-i18n="item_sidebar_title">Inventory</h3>
            <div style="position: relative;">
                <input type="text" id="item-search" placeholder="Search inventory..."
                    style="width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: var(--radius-pill); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s;">
            </div>
        </div>
        
        <div id="item-category-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;">
            <!-- Categories or filters injected here via item.js -->
        </div>
    </div>

    <!-- Splitter -->
    <div id="item-splitter" class="splitter-v"></div>

    <!-- Main Content -->
    <div id="item-main-content" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); padding: 30px;">
        
        <div id="item-list-container" class="glass-card" style="flex: 1; overflow: hidden; border-radius: var(--radius-card); padding: 0; display: flex; flex-direction: column;">
            <div style="padding: 24px; border-bottom: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between;">
                <div style="font-weight: 800; color: var(--text-primary); font-size: 1.1em;">Records Database</div>
                <div id="inventory-count" style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">0 Entries found</div>
            </div>
            
            <div id="item-list-scroller" style="flex: 1; overflow-y: auto; padding: 20px;">
                <div id="item-list" style="display: flex; flex-direction: column; gap: 8px;">
                    <!-- Items rendered dynamically via item.js -->
                </div>
            </div>
        </div>

    </div>
</div>
