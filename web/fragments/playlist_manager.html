<!-- ===================== PLAYLIST MANAGER START ===================== -->
    <div id="playlist-browser-active-view-container"
        style="display: flex; flex-direction: row; height: 100%; overflow: hidden;">
        <!-- Left Column: Playlist Selection -->
        <div id="playlist-management-sidebar"
            style="width: 320px; flex-shrink: 0; background: #fafafa; border-right: 1px solid #ddd; display: flex; flex-direction: column;">
            <div
                style="padding: 15px; border-bottom: 1px solid #ddd; background: #fff; display: flex; align-items: center; justify-content: space-between;">
                <h3 style="margin: 0; font-size: 1em; color: #666;" data-i18n="nav_playlist">Gespeicherte Listen</h3>
                <button onclick="createNewPlaylistPrompt()" class="player-btn"
                    title="Neue Playlist erstellen" style="padding: 4px 8px; font-size: 0.8em;">+</button>
            </div>
            <div id="sidebar-playlist-item-list-container" class="scrolling-view"
                style="flex: 1; overflow-y: auto;">
                <!-- List of saved playlists will be injected here -->
            </div>
        </div>

        <!-- Right Column: Active Playlist Content -->
        <div id="playlist-active-content-view"
            style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff;">
            <div id="playlist-active-renderer-header"
                style="padding: 20px 30px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between;">
                <div>
                    <h2 id="playlist-active-instance-title" style="margin: 0; font-size: 1.5em; color: #333;">Keine Playlist gewählt</h2>
                    <div id="playlist-active-instance-meta" style="color: #888; font-size: 0.85em; margin-top: 5px;">0 Einträge • 0:00:00 Gesamtlaufzeit</div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="playCurrentActivePlaylist()" class="player-btn"
                        style="background: #2a7; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Abspielen</button>
                    <button onclick="exportPlaylistToLocalDisk()" class="player-btn"
                        style="background: #fff; border: 1px solid #ddd; padding: 10px 15px; border-radius: 8px; cursor: pointer;">Export</button>
                    <button onclick="deleteActivePlaylistPermanently()" class="player-btn"
                        style="background: #fff; border: 1px solid #f44; color: #f44; padding: 10px 15px; border-radius: 8px; cursor: pointer;">Löschen</button>
                </div>
            </div>

            <div id="playlist-item-render-pane" class="scrolling-view"
                style="flex: 1; overflow-y: auto; padding: 0;">
                <div id="playlist-content-render-target"
                    style="display: flex; flex-direction: column; width: 100%;">
                    <!-- Items of selected playlist will be injected here -->
                </div>
            </div>
        </div>
    </div>
<!-- ===================== PLAYLIST MANAGER END ===================== -->
