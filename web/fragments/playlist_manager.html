<!-- ===================== PLAYLIST MANAGER (v1.34 Refined) ===================== -->
<div id="playlist-browser-active-view-container" style="display: flex; flex-direction: row; height: 100%; overflow: hidden; background: var(--bg-primary);">
    
    <!-- Left Column: Playlist Selection (Sidebar) -->
    <div id="playlist-management-sidebar" class="sidebar" style="width: 320px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column;">
        <div style="padding: 24px; border-bottom: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between;">
            <h3 style="margin: 0; font-size: 1.1em; font-weight: 800; color: var(--text-primary);" data-i18n="nav_playlist">Gespeicherte Listen</h3>
            <button onclick="createNewPlaylistPrompt()" class="tab-btn active" title="Neue Playlist erstellen" style="padding: 4px 12px; font-size: 14px; border: none;">+</button>
        </div>
        
        <div id="sidebar-playlist-item-list-container" class="scrolling-view" style="flex: 1; overflow-y: auto; padding: 12px;">
            <!-- List of saved playlists will be injected here via audioplayer.js/playlist.js -->
        </div>
    </div>

    <!-- Right Column: Active Playlist Content -->
    <div id="playlist-active-content-view" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary);">
        
        <div id="playlist-active-renderer-header" style="padding: 30px 40px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: radial-gradient(circle at top right, var(--bg-secondary) 0%, var(--bg-primary) 60%);">
            <div>
                <h2 id="playlist-active-instance-title" style="margin: 0; font-size: 1.8em; font-weight: 900; color: var(--text-primary); letter-spacing: -1px;">Keine Playlist gewählt</h2>
                <div id="playlist-active-instance-meta" style="color: var(--text-secondary); font-size: 0.9em; margin-top: 8px; font-weight: 600; opacity: 0.7;">0 Einträge • 0:00:00 Gesamtlaufzeit</div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="playCurrentActivePlaylist()" class="tab-btn active" style="padding: 12px 24px; font-weight: 800;">Abspielen</button>
                <button onclick="exportPlaylistToLocalDisk()" class="tab-btn" style="padding: 12px 20px; font-weight: 700;">Export</button>
                <button onclick="deleteActivePlaylistPermanently()" class="tab-btn" style="padding: 12px 20px; font-weight: 700; color: #ff5252; border-color: rgba(255, 82, 82, 0.2);">Löschen</button>
            </div>
        </div>

        <div id="playlist-item-render-pane" class="scrolling-view" style="flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-primary);">
            <div id="playlist-content-render-target" style="display: flex; flex-direction: column; width: 100%; gap: 4px;">
                <!-- Items of selected playlist will be injected here -->
            </div>
        </div>
    </div>
</div>
<!-- ===================== PLAYLIST MANAGER END ===================== -->
