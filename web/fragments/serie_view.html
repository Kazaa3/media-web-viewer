<!-- ===================== SERIEN VIEW (v1.41.00) ===================== -->
<div id="series-container" style="display: flex; flex-direction: column; height: 100%; background: var(--bg-primary); overflow: hidden;">
    
    <!-- Top Filter Bar -->
    <div style="padding: 20px 40px; background: var(--bg-secondary); border-bottom: 3px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h2 style="margin: 0; font-size: 1.5em; font-weight: 800; color: #3498db;">TV & Serien</h2>
            <div id="series-stats" style="font-size: 11px; opacity: 0.6; font-weight: 600;">Lade Staffeln...</div>
        </div>
        
        <div style="display: flex; gap: 15px;">
            <input type="text" id="series-search" placeholder="Serien durchsuchen..." 
                   oninput="renderSeriesGrid()"
                   style="padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); width: 250px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        </div>
    </div>

    <!-- Series Grid -->
    <div id="series-scroll-viewport" style="flex: 1; overflow-y: auto; padding: 40px; scrollbar-width: thin;">
        <div id="series-grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px;">
            <!-- Series cards injected via initSeriesView -->
        </div>
    </div>

</div>

<style>
    .series-card {
        cursor: pointer;
        transition: transform 0.3s ease;
        position: relative;
    }
    .series-card:hover {
        transform: translateY(-8px);
    }
    .series-poster {
        width: 100%;
        aspect-ratio: 16/9; /* Series use widescreen thumbnails or main posters */
        background: var(--bg-secondary);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        position: relative;
    }
    .series-poster img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .series-season-badge {
        position: absolute;
        bottom: 12px;
        left: 12px;
        background: rgba(52, 152, 219, 0.9);
        color: white;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        backdrop-filter: blur(4px);
    }
    .series-episode-count {
        position: absolute;
        bottom: 12px;
        right: 12px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 700;
        backdrop-filter: blur(4px);
    }
    .series-info {
        margin-top: 15px;
    }
    .series-title {
        font-weight: 800;
        font-size: 16px;
        color: var(--text-primary);
        display: -webkit-box;
        -webkit-line-clamp: 1;
        line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .series-meta {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 4px;
        opacity: 0.8;
    }
</style>

<script>
    /**
     * Series Controller (v1.41.00)
     */
    function initSeriesView() {
        console.log("[Series] Booting Episodic Controller...");
        renderSeriesGrid();
    }

    async function renderSeriesGrid() {
        const container = document.getElementById('series-grid-container');
        if (!container) return;
        
        // 1. Group items into "Series -> Collections"
        const allMedia = window.allLibraryItems || [];
        const seriesMap = {}; 
        
        allMedia.filter(i => i.category === 'Serie' || i.media_type === 'series' || i.media_type === 'episode').forEach(item => {
            const seriesName = (item.tags && item.tags.series) ? item.tags.series : item.name.split(' - S')[0];
            const season = (item.tags && item.tags.season) || 'S01';
            const key = `${seriesName}-${season}`;
            
            if (!seriesMap[key]) {
                seriesMap[key] = {
                    seriesName: seriesName,
                    season: season,
                    cover: item.art_path || 'assets/default_series.png',
                    episodes: [],
                    lastPlayed: item.last_played || null
                };
            }
            seriesMap[key].episodes.push(item);
        });

        const sortedSeries = Object.values(seriesMap).sort((a,b) => a.seriesName.localeCompare(b.seriesName));
        document.getElementById('series-stats').innerText = `${sortedSeries.length} Staffeln verarbeitet`;

        let html = sortedSeries.map(s => {
            const epCount = s.episodes.length;
            
            return `
                <div class="series-card" onclick="openSeriesSeason('${s.seriesName}', '${s.season}')">
                    <div class="series-poster">
                        <img src="${s.cover}" loading="lazy">
                        <div class="series-season-badge">Season ${s.season.replace('S', '')}</div>
                        <div class="series-episode-count">${epCount} Folgen</div>
                    </div>
                    <div class="series-info">
                        <div class="series-title">${s.seriesName}</div>
                        <div class="series-meta">
                            ${epCount} Episoden | ${s.lastPlayed ? 'Zuletzt gesehen' : 'Gesehen: 0%'}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        container.innerHTML = html || '<div style="grid-column: 1/-1; text-align: center; padding: 100px;">Keine Serien in der Bibliothek gefunden.</div>';
    }

    function openSeriesSeason(series, season) {
        if (typeof showToast === 'function') showToast(`Zeige ${series}: Staffel ${season}`, "info");
        // Detail implementation for episode list would go here
    }
</script>
