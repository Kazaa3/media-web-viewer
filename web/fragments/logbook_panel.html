<!-- ===================== LOGBOOK / JOURNAL PANEL (v1.34 Optimized) ===================== -->
<div id="localized-markdown-documentation-journal-panel" class="tab-content"
    style="display: flex; height: 100%; flex-direction: column; overflow: hidden; padding: 0; background: var(--bg-primary);">
    
    <!-- Module Header -->
    <div style="padding: 30px 40px 10px 40px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;">
        <div>
            <h2 style="margin: 0; font-size: 1.8em; font-weight: 900; color: var(--text-primary); letter-spacing: -1.5px; text-transform: lowercase;">dict://logbuch</h2>
            <div style="font-size: 10px; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px;">Journal & Documentation Suite</div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button onclick="loadLogbuchTab(0, true)" class="tab-btn active" style="padding: 10px 20px; font-weight: 700; font-size: 11px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 8px;"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                SYNC BACKEND
            </button>
            <button onclick="openLogbookEditor()" class="tab-btn active" style="padding: 10px 20px; font-weight: 700; font-size: 11px; background: var(--accent-color); border: none; color: white;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                NEUER EINTRAG
            </button>
        </div>
    </div>

    <!-- Main Workspace Container -->
    <div id="logbuch-split-container" style="flex: 1; display: flex; overflow: hidden; min-height: 0; margin-top: 20px; border-top: 1px solid var(--border-color);">
        
        <!-- SIDEBAR: TOC -->
        <div id="logbuch-sidebar" class="sidebar" style="width: 320px; border-right: 1px solid var(--border-color); background: var(--bg-sidebar); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;">
            <div style="padding: 24px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.03);">
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div>
                        <label style="font-size: 9px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block;">Kategorie</label>
                        <select id="logbuch-category-filter" onchange="renderLogbuchEntries(currentLogbuchEntries || [])"
                            class="action-btn" style="width: 100%; border-radius: var(--radius-pill); font-size: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color);">
                            <option value="Alle" data-i18n="logbook_category_all">Alle Kategorien</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 9px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block;">Status</label>
                        <select id="logbuch-status-filter" onchange="renderLogbuchEntries(currentLogbuchEntries || [])"
                            class="action-btn" style="width: 100%; border-radius: var(--radius-pill); font-size: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color);">
                            <option value="ALL" data-i18n="logbook_status_all">Alle Status</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- List Scroll Area -->
            <div id="logbuch-entry-sidebar-items" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px;" data-i18n="logbook_loading_items">
                <!-- Dynamically populated via logbook_helpers.js -->
                <div style="text-align: center; padding: 40px; color: var(--text-secondary); font-size: 12px; font-weight: 600;">Einträge werden synchronisiert...</div>
            </div>
        </div>

        <!-- Splitter -->
        <div id="logbuch-splitter" class="splitter-v"></div>

        <!-- CONTENT VIEW: Markdown Renderer -->
        <div id="logbuch-viewer-pane" style="flex: 1; background: var(--bg-primary); display: flex; flex-direction: column; overflow: hidden; position: relative;">
            
            <div id="logbuch-viewer-header" class="glass-card" style="; padding: 40px; margin: 30px; border-radius: 20px; border: 1px solid var(--border-color); background: radial-gradient(circle at top left, var(--bg-secondary) 0%, transparent 100%);">
                <h2 id="logbuch-tab-title" style="margin: 0; color: var(--text-primary); font-size: 2.2em; font-weight: 900; letter-spacing: -1.5px; line-height: 1.1;"></h2>
                <div id="logbuch-entry-meta" style="margin-top: 15px; display: flex; align-items: center; gap: 24px; font-size: 11px; color: var(--text-secondary); font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px;">
                    <!-- Meta info injected here -->
                </div>
            </div>

            <div id="logbuch-scroll-container" style="flex: 1; overflow-y: auto; padding: 0 60px 100px 60px; scroll-behavior: smooth;">
                <div id="logbuch-tab-content" style="line-height: 1.8; color: var(--text-primary); font-size: 1.1em; max-width: 850px; margin: 0 auto; word-wrap: break-word; font-family: 'Inter', sans-serif;">
                    
                </div>
            </div>

            <!-- VIEW: Features Status (Integrated v1.34) -->
            <div id="logbuch-features-view" style="; padding: 40px; overflow-y: auto; height: 100%;">
                <div class="glass-card" style="max-width: 900px; margin: 0 auto; padding: 40px; background: rgba(0, 122, 255, 0.02); border: 1px solid rgba(0, 122, 255, 0.1);">
                    <h2 style="margin: 0 0 20px 0; font-weight: 900; font-size: 2em; letter-spacing: -1px; color: var(--text-primary);">Projekt-Status & Features</h2>
                    <div id="feature-list-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <!-- Dynamically loaded via toggleFeatureStatus/refreshFeatures logic -->
                    </div>
                </div>
            </div>
            
            <!-- Quick Action Floating Button (Optional) -->
            <button onclick="document.getElementById('logbuch-scroll-container').scrollTo({top: 0, behavior: 'smooth'})" 
                    id="log-scroll-top-btn"
                    style="position: absolute; bottom: 40px; right: 40px; width: 44px; height: 44px; border-radius: 50%; background: var(--bg-secondary); border: 1px solid var(--border-color); box-shadow: var(--shadow-hard); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: all 0.2s;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
        </div>
    </div>
</div>
