<!-- ===================== LOCALIZED LOGBOOK PANEL (v1.34 Modernized) ===================== -->
<div id="localized-markdown-documentation-journal-panel" class="tab-content"
    style="display: flex; height: 100%; flex-direction: column; overflow: hidden; padding: 0; background: var(--bg-primary);">
    
    <div style="padding: 24px 30px 10px 30px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;">
        <h2 style="margin: 0; font-size: 1.5em; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px;" data-i18n="logbook_title">
            Vollständiges Logbuch</h2>
        <div style="display: flex; gap: 10px;">
            <button onclick="loadLogbuchTab(0, true)" class="tab-btn active sm" style="font-size: 12px; height: 32px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                Sync
            </button>
            <button onclick="openLogbookEditor()" class="tab-btn active sm" style="font-size: 12px; height: 32px; background: var(--accent-color); border: none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Neuer Eintrag
            </button>
        </div>
    </div>

    <!-- Main Shared Container -->
    <div id="logbuch-split-container" style="flex: 1; display: flex; overflow: hidden; min-height: 0; margin-top: 10px;">
        
        <!-- LEFT SIDEBAR: TOC -->
        <div id="logbuch-sidebar" style="width: 320px; border-right: 1px solid var(--border-color); background: var(--bg-sidebar); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;">
            <div style="padding: 20px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.05);">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <select id="logbuch-category-filter" onchange="renderLogbuchEntries(currentLogbuchEntries || [])"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: var(--radius-pill); font-size: 12px; background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; outline: none;">
                        <option value="Alle" data-i18n="logbook_category_all">Alle Kategorien</option>
                    </select>
                    <select id="logbuch-status-filter" onchange="renderLogbuchEntries(currentLogbuchEntries || [])"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: var(--radius-pill); font-size: 12px; background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; outline: none;">
                        <option value="ALL" data-i18n="logbook_status_all">Alle Status</option>
                    </select>
                </div>
            </div>
            <div id="logbuch-tab-list" style="flex: 1; overflow-y: auto; padding: 10px;" data-i18n="logbook_loading_items">
                Einträge werden geladen...
            </div>
        </div>

        <!-- Splitter (Modernized) -->
        <div id="logbuch-splitter" style="width: 1px; background: var(--border-color); cursor: col-resize;"></div>

        <!-- RIGHT CONTENT: Viewer -->
        <div id="logbuch-viewer-pane" style="flex: 1; background: var(--bg-primary); display: flex; flex-direction: column; overflow: hidden; position: relative;">
            
            <div id="logbuch-viewer-header" style="display:none; padding: 30px 40px; border-bottom: 1px solid var(--border-color); background: var(--bg-secondary);">
                <h2 id="logbuch-tab-title" style="margin: 0; color: var(--text-primary); font-size: 1.8em; font-weight: 800; letter-spacing: -0.5px;"></h2>
                <div id="logbuch-entry-meta" style="margin-top: 12px; display: flex; gap: 20px; font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;"></div>
            </div>

            <div id="logbuch-scroll-container" style="flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth;">
                <div id="logbuch-tab-content" style="line-height: 1.7; color: var(--text-primary); font-size: 1.05em; max-width: 800px; margin: 0 auto; word-wrap: break-word; font-family: 'Inter', sans-serif;">
                    <!-- Placeholder -->
                    <div style="text-align: center; padding: 100px 20px; opacity: 0.4;">
                        <div style="font-size: 80px; margin-bottom: 20px;">📓</div>
                        <h3 style="margin: 0 0 10px 0; font-weight: 800;" data-i18n="logbook_welcome">Willkommen</h3>
                        <p style="font-size: 0.9em;" data-i18n="logbook_select_entry">Wähle links einen Eintrag aus, um ihn zu lesen.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
