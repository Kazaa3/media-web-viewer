<!-- ===================== PLAYER QUEUE (v1.34) ===================== -->
<div id="player-tab-split-container" style="display: flex; width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary);">
    
    <!-- LEFT COLUMN: Active Queue (Sidebar) -->
    <div id="player-left-sidebar" class="sidebar" style="width: 320px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border-color); background: var(--bg-sidebar);">
        
        <div style="padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
            <h3 style="margin: 0; font-size: 1.1em; font-weight: 800; color: var(--text-primary);" data-i18n="nav_queue">Warteschlange</h3>
            <span id="queue-item-count" style="background: var(--accent-color); color: white; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 700;">0 Items</span>
        </div>

        <div id="player-queue-pane" style="flex: 1; overflow-y: auto; padding: 0;">
            <div id="active-queue-list-render-target" style="display: flex; flex-direction: column; gap: 0;">
                <!-- Queue items will be injected here via audioplayer.js -->
            </div>
        </div>

        <div style="padding: 16px; border-top: 1px solid var(--border-color); display: flex; gap: 8px; background: var(--bg-sidebar);">
            <button onclick="clearQueue()" class="tab-btn" style="flex: 1; justify-content: center; font-size: 12px; color: #ff5252; border-color: rgba(255, 82, 82, 0.2);">Liste leeren</button>
            <button onclick="shuffleQueue()" class="tab-btn" style="flex: 1; justify-content: center; font-size: 12px;">Mischen</button>
        </div>
    </div>

    <!-- Splitter -->
    <div class="splitter-v" id="player-analytics-splitter"></div>

    <!-- RIGHT COLUMN: Active Item Details (Main content) -->
    <div id="video-queue-pane" style="flex: 1; display:flex; flex-direction:column; overflow: hidden; background: var(--bg-primary); position: relative;">
        
        <!-- Top Control Area (Now Playing & Toggle) -->
        <div style="padding: 20px 40px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; gap: 15px; align-items: center;">
                <h2 style="margin: 0; font-size: 1.1em; font-weight: 800; color: var(--text-primary);">Player Dashboard</h2>
                <div class="options-nav-tabs" style="display: flex; gap: 4px;">
                    <button id="player-view-btn-nowplaying" class="sub-tab-btn active" onclick="switchPlayerMainView('now-playing')">Now Playing</button>
                    <button id="player-view-btn-browse" class="sub-tab-btn" onclick="switchPlayerMainView('browse')">Full Library</button>
                </div>
            </div>
            <div id="player-search-bar" style="display: none; width: 300px;">
                <input type="text" id="player-library-search" placeholder="Search indexed media..." 
                    oninput="handlePlayerLibrarySearch(this.value)"
                    style="width: 100%; padding: 8px 16px; border-radius: var(--radius-pill); border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 12px; outline: none;">
            </div>
        </div>

        <div id="player-main-content-viewport" style="flex: 1; position: relative; overflow: hidden;">
            <!-- View: Now Playing -->
            <div id="player-view-now-playing" class="player-sub-view active" style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg-primary) 100%); transition: opacity 0.3s ease;">
                <!-- Artwork Card -->
                <div id="big-player-artwork-container" class="glass-card" style="width: 420px; height: 420px; margin-bottom: 30px; padding: 0; overflow: hidden; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);">
                    <img id="big-player-artwork" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <!-- Metadata Info -->
                <div id="big-player-info" style="max-width: 800px;">
                    <h2 id="big-player-title" style="margin: 0; font-size: 2.2em; font-weight: 900; color: var(--text-primary); letter-spacing: -1px; line-height: 1.1;" data-i18n="player_select_song">Wählt ein Lied aus</h2>
                    <h3 id="big-player-artist" style="margin: 10px 0 20px 0; font-size: 1.25em; font-weight: 500; color: var(--text-secondary); opacity: 0.8;">Warteschlange leer</h3>
                </div>
                <!-- Tech Details -->
                <div id="big-player-metadata-grid" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <div id="big-bitrate-display" class="track-codec">-</div>
                    <div id="big-samplerate-display" class="track-codec">-</div>
                </div>
            </div>

            <!-- View: Library Browser (GRID) -->
            <div id="player-view-browse" class="player-sub-view" style="display: none; height: 100%; overflow-y: auto; padding: 30px; background: var(--bg-primary);">
                <div id="player-library-grid" class="media-grid">
                    <!-- Populated via audioplayer.js -->
                </div>
            </div>
        </div>

        <!-- Overlay status -->
        <div id="player-stats-overlay" style="position: absolute; top: 30px; right: 30px; pointer-events: none;">
            <!-- optional diagnostics -->
        </div>
    </div>
</div>
<!-- ===================== PLAYER QUEUE END ===================== -->
