                <img id="big-player-artwork-visualizer" class="synced-artwork"

            <!-- Float Metadata -->

        <!-- VIEW 4: Playlist Manager (v1.34 Integrated) -->

                    style="flex: 1; overflow-y: auto; padding: 12px;">

                </div>

            <!-- Right Column: Active Playlist Content -->
            <div id="playlist-active-content-view"
                style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary);">

                    <div>
                        <h2 id="playlist-active-instance-title"
                            style="margin: 0; font-size: 1.8em; font-weight: 900; color: var(--text-primary); letter-spacing: -1px;">
                            Keine Playlist gewählt</h2>
                        <div id="playlist-active-instance-meta"
                            style="color: var(--text-secondary); font-size: 0.9em; margin-top: 8px; font-weight: 600; opacity: 0.7;">
                            0 Titel • 0:00:00 Gesamtlaufzeit</div>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button onclick="playCurrentActivePlaylist()" class="tab-btn active"
                            style="padding: 12px 24px; font-weight: 800;">Abspielen</button>
                        <button onclick="exportPlaylistToLocalDisk()" class="tab-btn"
                            style="padding: 12px 20px; font-weight: 700;">Export</button>
                        <button onclick="deleteActivePlaylistPermanently()" class="tab-btn"
                            style="padding: 12px 20px; font-weight: 700; color: #ff5252; border-color: rgba(255, 82, 82, 0.2);">Löschen</button>
                    </div>

                <div id="playlist-item-render-pane" class="scrolling-view"
                    style="flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-primary);">
                    <div id="playlist-content-render-target"
                        style="display: flex; flex-direction: column; width: 100%; gap: 4px;">
                        <!-- Items injected here -->
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    /**
     * Switch Player Sub-Views (v1.34 Master)
     */
    /**
     * Switch Player Sub-Views (v1.35 Recovery)
     */
    function switchPlayerInternalView(viewId) {
        if (typeof mwv_trace_render === 'function') mwv_trace_render('PLAYER-FRAGMENT', 'SWITCH-START', { viewId });

        try {
            // Hide all views
            document.querySelectorAll('.player-view-container').forEach(el => {
                el.style.display = 'none';
                el.classList.remove('active');
            });

            // Deactivate all sub-nav buttons
            document.querySelectorAll('.player-sub-nav-btn').forEach(el => {
                el.classList.remove('active');
            });

            // Show target view
            const target = document.getElementById('player-view-' + viewId);
            if (target) {
                target.style.display = 'flex';
                target.classList.add('active');

                // Sync with sub-nav buttons
                const btn = document.querySelector(`.player-sub-nav-btn[onclick*="'${viewId}'"]`);
                if (btn) btn.classList.add('active');

                if (typeof mwv_trace_render === 'function') mwv_trace_render('PLAYER-FRAGMENT', 'SWITCH-SYNC', { viewId, targetFound: true });
            } else {
                if (typeof log_js_error === 'function') log_js_error(new Error(`Target view NOT found: ${viewId}`), 'PLAYER-NAV');
            }

            // Trigger view-specific data refresh
            if (viewId === 'warteschlange' && typeof renderPlaylist === 'function') {
                renderPlaylist();
            } else if (viewId === 'visualizer' && typeof initVisualizer === 'function') {
                initVisualizer();
            } else if (viewId === 'playlist' && typeof refreshSavedPlaylists === 'function') {
                refreshSavedPlaylists();
            }

            if (typeof mwv_trace_render === 'function') mwv_trace_render('PLAYER-FRAGMENT', 'SWITCH-COMPLETE', { viewId });

        } catch (err) {
            if (typeof log_js_error === 'function') log_js_error(err, 'PLAYER-VIEW-SWITCH');
        }
    }

    // IMMEDIATE: Force Queue view on first execution (v1.37 FastBoot)
    try {
        const activeView = document.querySelector('.player-view-container.active');
        if (typeof mwv_trace_render === 'function') mwv_trace_render('PLAYER-FRAGMENT', 'BOOT-CHECK', { hasActive: !!activeView });

        if (!activeView) {
            console.info("[PLAYER] No active view detected, forcing 'warteschlange'...");
            if (typeof switchPlayerInternalView === 'function') switchPlayerInternalView('warteschlange');
        }
    } catch (err) {
        if (typeof log_js_error === 'function') log_js_error(err, 'PLAYER-BOOT-IMMEDIATE');
    }
</script>
<!-- ===================== PLAYER QUEUE END ===================== -->
