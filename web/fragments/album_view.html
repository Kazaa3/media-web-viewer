<!-- ===================== ALBEN VIEW (v1.35.68) ===================== -->
<div id="albums-container" style="display: flex; flex-direction: column; height: 100%; background: var(--bg-primary); overflow: hidden;">
    
    <!-- Top Filter Bar -->
    <div style="padding: 20px 40px; background: var(--bg-secondary); border-bottom: 2px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h2 style="margin: 0; font-size: 1.5em; font-weight: 800; color: #e74c3c;">Musik Alben</h2>
            <div id="albums-stats" style="font-size: 11px; opacity: 0.6; font-weight: 600;">Lade Diskografie...</div>
        </div>
        
        <div style="display: flex; gap: 15px;">
            <input type="text" id="albums-search" placeholder="Alben durchsuchen..." 
                   oninput="renderAlbumsGrid()"
                   style="padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); width: 250px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        </div>
    </div>

    <!-- Albums Grid -->
    <div id="albums-scroll-viewport" style="flex: 1; overflow-y: auto; padding: 40px; scrollbar-width: thin;">
        <div id="albums-grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 40px;">
            <!-- Album cards injected via initAlbumsView -->
        </div>
    </div>

</div>

<style>
    .album-card {
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
    }
    .album-card:hover {
        transform: scale(1.05);
    }
    .album-cover {
        width: 100%;
        aspect-ratio: 1/1;
        background: #222;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        position: relative;
        transition: box-shadow 0.3s ease;
    }
    .album-card:hover .album-cover {
        box-shadow: 0 15px 45px rgba(231, 76, 60, 0.3);
    }
    .album-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .album-badge-premium {
        position: absolute;
        top: 8px;
        right: 8px;
        background: linear-gradient(45deg, #f1c40f, #f39c12);
        color: #000;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .album-info {
        margin-top: 15px;
        text-align: center;
    }
    .album-title {
        font-weight: 800;
        font-size: 14px;
        color: var(--text-primary);
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .album-artist {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 2px;
        opacity: 0.8;
    }
</style>

<script>
    /**
     * Albums Controller (v1.35.68)
     */
    function initAlbumsView() {
        console.log("[Albums] Booting 1:1 Discography Grid...");
        renderAlbumsGrid();
    }

    async function renderAlbumsGrid() {
        const container = document.getElementById('albums-grid-container');
        if (!container) return;
        
        // 1. Group items into "Album Objects"
        const allMedia = window.allLibraryItems || [];
        const albumMap = {}; 
        
        allMedia.filter(i => i.category === 'Audio' || i.category === 'Album').forEach(item => {
            const album = (item.tags && item.tags.album) || 'Unbekanntes Album';
            const artist = (item.tags && item.tags.artist) || 'V.A.';
            const key = `${artist}-${album}`;
            
            if (!albumMap[key]) {
                albumMap[key] = {
                    album: album,
                    artist: artist,
                    cover: item.art_path || 'assets/default_album.png',
                    tracks: [],
                    isPremium: (item.tags && item.tags.album && item.tags.album.toLowerCase().includes('premium')) || false
                };
            }
            albumMap[key].tracks.push(item);
        });

        const sortedAlbums = Object.values(albumMap).sort((a,b) => a.album.localeCompare(b.album));
        document.getElementById('albums-stats').innerText = `${sortedAlbums.length} Alben in der Sammlung`;

        let html = sortedAlbums.map(a => {
            return `
                <div class="album-card" onclick="openAlbumPlayer('${a.album}', '${a.artist}')">
                    <div class="album-cover">
                        <img src="${a.cover}" loading="lazy">
                        ${a.isPremium ? `<div class="album-badge-premium">Premium</div>` : ''}
                    </div>
                    <div class="album-info">
                        <div class="album-title">${a.album}</div>
                        <div class="album-artist">${a.artist}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        container.innerHTML = html || '<div style="grid-column: 1/-1; text-align: center; padding: 100px;">Keine Alben gefunden.</div>';
    }

    function openAlbumPlayer(album, artist) {
        if (typeof showToast === 'function') showToast(`Lade Album: ${album} - ${artist}`, "info");
        // Detail implementation for track listing would go here
    }
</script>
