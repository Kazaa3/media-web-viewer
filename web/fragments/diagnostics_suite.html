<!-- ===================== DIAGNOSTICS SUITE (v1.34 Refined) ===================== -->
<div id="diagnostics-suite-fragment" style="display: flex; flex-direction: column; height: 100%; background: var(--bg-primary); border-radius: var(--radius-card); overflow: hidden;">
    
    <!-- Control Header & Sub-Tabs -->
    <div class="sub-nav-bar" style="padding: 12px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h2 style="margin: 0; font-size: 1.25em; font-weight: 800; color: var(--text-primary);" data-i18n="nav_diagnostics">Diagnose-Suite</h2>
            <div class="options-nav-tabs" style="display: flex; gap: 4px;">
                <button class="sub-tab-btn active diagnostics-subtab" data-view="health" onclick="switchDiagnosticsView('health')">Systen-Health</button>
                <button class="sub-tab-btn diagnostics-subtab" data-view="debug-db" onclick="switchDiagnosticsView('debug-db')">Debug DB</button>
                <button class="sub-tab-btn diagnostics-subtab" data-view="latency" onclick="switchDiagnosticsView('latency')">Latency</button>
            </div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button id="diag-main-action-btn" onclick="runAllTestsUI()" class="tab-btn active" style="background: #2ecc71; border: none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> 
                <span style="font-weight: 700;">Run Tests</span>
            </button>
            <button onclick="clearDiagnosticsUI()" class="tab-btn" style="font-weight: 700;">Reset</button>
        </div>
    </div>

    <!-- Main Viewport -->
    <div id="diagnostics-viewport" style="flex: 1; overflow-y: auto; background: var(--bg-primary);">
        
        <!-- VIEW: System Health -->
        <div id="diagnostics-health-view" class="diagnostics-view" style="display: block; padding: 30px;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px;">
                <!-- Connectivity -->
                <div class="glass-card" style="padding: 24px; border-top: 4px solid #3498db;">
                    <h3 style="margin: 0 0 20px 0; font-size: 1.1em; color: var(--text-primary); display: flex; align-items: center; gap: 10px; font-weight: 800;">Konnektivität</h3>
                    <div id="diag-conn-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
                </div>
                <!-- Media Pipeline -->
                <div class="glass-card" style="padding: 24px; border-top: 4px solid #9b59b6;">
                    <h3 style="margin: 0 0 20px 0; font-size: 1.1em; color: var(--text-primary); display: flex; align-items: center; gap: 10px; font-weight: 800;">Media Pipeline</h3>
                    <div id="diag-playback-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
                </div>
                <!-- Filesystem & DB -->
                <div class="glass-card" style="padding: 24px; border-top: 4px solid #e67e22;">
                    <h3 style="margin: 0 0 20px 0; font-size: 1.1em; color: var(--text-primary); display: flex; align-items: center; gap: 10px; font-weight: 800;">Filesystem & DB</h3>
                    <div id="diag-fs-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
                </div>
            </div>

            <!-- Terminal Results Overlay -->
            <div id="diagnostics-results-pane" style="margin-top: 30px; padding: 24px; background: #0a0a0a; border: 1px solid var(--border-color); color: #00ff41; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; height: 180px; overflow-y: auto; display: none; line-height: 1.5;"></div>
        </div>

        <!-- VIEW: Debug DB -->
        <div id="diagnostics-debug-db-view" class="diagnostics-view" style="display: none; padding: 40px;">
            <div class="glass-card" style="padding: 30px; margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h3 style="margin: 0; font-weight: 900; color: var(--text-primary); font-size: 1.4em; letter-spacing: -1px;">Database Live-Probe</h3>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="debug-dict-select" class="tab-btn" onchange="renderDebugDatabase()" style="padding: 6px 15px;">
                            <option value="library">Full Library Map</option>
                            <option value="config">Core Config Cache</option>
                            <option value="stats">Engine Stats</option>
                        </select>
                        <button onclick="renderDebugDatabase()" class="tab-btn active">Refresh</button>
                    </div>
                </div>
                
                <div id="debug-db-info" style="margin-bottom: 25px; background: var(--bg-secondary); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);">
                    <!-- DB Stats injected here -->
                </div>

                <div style="background: #000; border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); position: relative;">
                    <div style="position: absolute; top: 15px; right: 20px; font-size: 10px; color: var(--text-secondary); opacity: 0.5; font-weight: 800;">SCHEMA RAW DATA</div>
                    <pre id="debug-items-json" style="margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #a9b7c6; overflow-x: auto; max-height: 500px;">Waiting for probe...</pre>
                </div>
            </div>
            
            <div style="color: var(--text-secondary); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; text-align: center;">
                Backend Process ID: <span id="debug-python-pid" style="color: var(--accent-color);">--</span>
            </div>
        </div>

        <!-- VIEW: Latency -->
        <div id="diagnostics-latency-view" class="diagnostics-view" style="display: none; padding: 40px;">
            <div class="glass-card" style="padding: 40px; text-align: center;">
                <h3 style="font-weight: 800; color: var(--text-primary);">Network & IPC Latency Profile</h3>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">Measure the round-trip time between UI and Python Orchestrator.</p>
                <div style="display: flex; justify-content: center; gap: 15px;">
                    <button onclick="runLatencyDiagnostics()" class="tab-btn active" style="padding: 15px 40px; font-size: 1.1em;">Start Benchmark</button>
                </div>
                <div id="latency-results" style="margin-top: 40px;"></div>
            </div>
        </div>

    </div>
</div>

<script>
    function switchDiagnosticsView(viewId) {
        if (typeof mwv_trace === 'function') mwv_trace('SUBTAB-DIAG', viewId);
        
        document.querySelectorAll('.diagnostics-view').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.diagnostics-subtab').forEach(el => el.classList.remove('active'));
        
        const target = document.getElementById('diagnostics-' + viewId + '-view');
        if (target) {
            target.style.display = 'block';
            const btn = document.querySelector(`.diagnostics-subtab[data-view="${viewId}"]`);
            if (btn) btn.classList.add('active');
        }
        
        if (viewId === 'debug-db' && typeof renderDebugDatabase === 'function') {
            renderDebugDatabase();
        }
    }
</script>
