<!-- ===================== HÖRBUCH VIEW (v1.35.68) ===================== -->
<div id="audiobooks-container" style="display: flex; flex-direction: column; height: 100%; background: var(--bg-primary); overflow: hidden;">
    
    <!-- Top Filter Bar -->
    <div style="padding: 20px 40px; background: var(--bg-secondary); border-bottom: 2px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h2 style="margin: 0; font-size: 1.5em; font-weight: 800; color: #2ecc71;">Hörbuch Katalog</h2>
            <div id="audiobooks-stats" style="font-size: 11px; opacity: 0.6; font-weight: 600;">Lade Werke...</div>
        </div>
        
        <div style="display: flex; gap: 15px;">
            <input type="text" id="audiobooks-search" placeholder="Hörbücher durchsuchen..." 
                   oninput="renderAudiobooksGrid()"
                   style="padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); width: 250px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        </div>
    </div>

    <!-- Audiobooks Grid -->
    <div id="audiobooks-scroll-viewport" style="flex: 1; overflow-y: auto; padding: 40px; scrollbar-width: thin;">
        <div id="audiobooks-grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px;">
            <!-- Audiobook cards injected via initAudiobooksView -->
        </div>
    </div>

</div>

<style>
    .audiobook-card {
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
    }
    .audiobook-card:hover {
        transform: translateY(-5px);
    }
    .audiobook-cover {
        width: 100%;
        aspect-ratio: 1/1;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        position: relative;
    }
    .audiobook-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .audiobook-format-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(46, 204, 113, 0.9);
        color: white;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 800;
        backdrop-filter: blur(4px);
    }
    .audiobook-info {
        margin-top: 15px;
    }
    .audiobook-title {
        font-weight: 800;
        font-size: 15px;
        color: var(--text-primary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 4px;
    }
    .audiobook-author {
        font-size: 13px;
        color: var(--text-secondary);
        opacity: 0.8;
    }
    .audiobook-progress-wrap {
        margin-top: 10px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
    }
    .audiobook-progress-fill {
        height: 100%;
        background: #2ecc71;
        box-shadow: 0 0 10px #2ecc71;
    }
</style>

<script>
    /**
     * Audiobooks Controller (v1.35.68)
     */
    function initAudiobooksView() {
        console.log("[Audiobooks] Booting m4b Chapter Engine...");
        renderAudiobooksGrid();
    }

    async function renderAudiobooksGrid() {
        const container = document.getElementById('audiobooks-grid-container');
        if (!container) return;
        
        // 1. Filter items (.m4b or audiobook category)
        const allMedia = window.allLibraryItems || [];
        const books = allMedia.filter(i => 
            i.extension === 'm4b' || i.category === 'Audiobook' || i.category === 'Hörbuch'
        );
        
        document.getElementById('audiobooks-stats').innerText = `${books.length} Werke bereitgestellt`;

        let html = books.map(b => {
            const progress = (b.playback_position && b.duration_sec) ? (b.playback_position / b.duration_sec * 100) : 0;
            const author = (b.tags && b.tags.artist) || (b.tags && b.tags.composer) || 'Unbekannt';
            const title = (b.tags && b.tags.title) || b.name.split('.')[0];
            
            return `
                <div class="audiobook-card" onclick="openAudiobookPlayer('${b.name}')">
                    <div class="audiobook-cover">
                        <img src="${b.art_path || 'assets/default_audiobook.png'}" loading="lazy">
                        <div class="audiobook-format-badge">M4B CHAPTERS</div>
                    </div>
                    <div class="audiobook-info">
                        <div class="audiobook-title">${title}</div>
                        <div class="audiobook-author">${author}</div>
                        
                        <div class="audiobook-progress-wrap">
                            <div class="audiobook-progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        container.innerHTML = html || '<div style="grid-column: 1/-1; text-align: center; padding: 100px;">Keine Hörbücher (.m4b) gefunden.</div>';
    }

    function openAudiobookPlayer(name) {
        if (typeof showToast === 'function') showToast(`Lade Hörbuch: ${name}`, "info");
        // Logic to open M4B player with chapters sidepanel
    }
</script>
