<!-- Video Player Section -->
<div id="video-container" style="aspect-ratio: 16/9; width: 100%; max-width: 900px; margin: auto;">
  <video id="video-player" class="video-js vjs-default-skin" controls preload="auto" width="100%" height="100%">
    <!-- source will be set dynamically -->
  </video>
</div>
<!-- ...existing code... -->
<script>
// ...existing code...
function startEmbeddedVideo(src) {
  // Remove any previous player instance
  if (window.videojsPlayer) {
    window.videojsPlayer.dispose();
  }
  // Remove visibility: hidden if present
  const video = document.getElementById('video-player');
  video.style.visibility = '';
  // Initialize Video.js with fill: true
  window.videojsPlayer = videojs('video-player', {
    fill: true,
    // fluid: false, // do not use fluid
    aspectRatio: '16:9',
    controls: true,
    preload: 'auto'
  });
  window.videojsPlayer.src({ src, type: 'video/mp4' });
  // Ensure the underlying <video> is visible
  const html5api = video.parentNode.querySelector('.vjs-tech');
  if (html5api) html5api.style.visibility = '';
  window.videojsPlayer.ready(function() {
    this.play();
  });
}
// ...existing code...
</script>
